// Compose stability configuration for the ValtPrinter SDK.
//
// Tells the Compose compiler to treat the listed classes as stable so it can
// correctly skip recomposition when they're passed to receipt composables
// (`PosPrintingScreen`, `KitchenReceipt`, `RestaurantHeader`).
//
// Why a config file instead of `@Immutable` annotations on the classes
// themselves: these are pure-Kotlin domain models that must NOT depend on
// `androidx.compose.runtime`. Adding the annotation would couple the domain
// layer to Compose, breaking Clean Architecture purity. The stability config
// is exactly the mechanism Compose provides for asserting external/pure-domain
// types are stable without polluting them with framework dependencies.
//
// Stability contract: every listed class must satisfy ALL of:
//   1. All primary-constructor properties are `val` (no `var`).
//   2. All field types are themselves stable (primitives, String, other
//      stable types, or `List<stable>` USED IMMUTABLY at the call site).
//   3. `equals()` / `hashCode()` are deterministic from the constructor
//      properties (data classes satisfy this automatically).
//
// If you add a `var` field or a mutable collection to one of these classes,
// REMOVE it from this list — lying to the compiler about stability causes
// subtle "stale UI" bugs that are extremely hard to track down.

// Receipt rendering models
com.yotech.valtprinter.domain.model.ReceiptData
com.yotech.valtprinter.domain.model.orderdata.BillingData
com.yotech.valtprinter.domain.model.orderdata.OrderItem
com.yotech.valtprinter.domain.model.orderdata.SubOrderItem
